name: CI – Build & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & lint the frontend
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend – Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CRM_frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CRM_frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ──────────────────────────────────────────────
  # 2. Build the backend
  # ──────────────────────────────────────────────
  backend:
    name: Backend – Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CRM_backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CRM_backend/package-lock.json

      - run: npm ci
      - run: npm run build

  # ──────────────────────────────────────────────
  # 3. Playwright API + E2E tests
  # ──────────────────────────────────────────────
  tests:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
          POSTGRES_DB: crm_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: crm_user
      DB_PASSWORD: crm_password
      DB_NAME: crm_db
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Seed the database ──────────────────────
      - name: Seed database
        run: |
          for sql in \
            edu_center.sql \
            subjects.sql \
            superuser.sql \
            teachers.sql \
            students.sql \
            class.sql \
            assignments.sql \
            assignment_submissions.sql \
            attendance.sql \
            grades.sql \
            tests.sql \
            payments.sql \
            finance_management.sql \
            UTILITIES_VIEWS_PROCEDURES.sql; do
            echo "▶ Running $sql"
            PGPASSWORD=crm_password psql -h localhost -U crm_user -d crm_db -f "CRM_database/$sql" || true
          done

      # ── Install backend & start it ─────────────
      - name: Install backend dependencies
        working-directory: CRM_backend
        run: npm ci

      - name: Start backend
        working-directory: CRM_backend
        run: npm run dev &
        env:
          PORT: 3000

      # ── Install frontend & start it ────────────
      - name: Install frontend dependencies
        working-directory: CRM_frontend
        run: npm ci

      - name: Start frontend
        working-directory: CRM_frontend
        run: npm run dev &

      # ── Wait for services to be ready ──────────
      - name: Wait for backend
        run: |
          echo "Waiting for backend on :3000…"
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 > /dev/null && break
            sleep 2
          done

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend on :5173…"
          for i in $(seq 1 30); do
            curl -s http://localhost:5173 > /dev/null && break
            sleep 2
          done

      # ── Run Playwright tests ───────────────────
      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: tests
        run: npx playwright test --project=api --project=chromium

      # ── Upload report on failure ───────────────
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14
